<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annie Trading Lab — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060b18;--bg2:#0d1424;--card:rgba(15,22,42,0.85);
  --border:rgba(99,102,241,0.12);--border-h:rgba(99,102,241,0.35);
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --green:#10b981;--green-b:#34d399;--green-g:rgba(16,185,129,0.12);
  --red:#ef4444;--red-b:#f87171;--red-g:rgba(239,68,68,0.12);
  --blue:#6366f1;--blue-b:#818cf8;--blue-g:rgba(99,102,241,0.12);
  --cyan:#06b6d4;--amber:#f59e0b;--purple:#8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* HEADER */
.header{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(6,182,212,0.05));border-bottom:1px solid var(--border);padding:20px 32px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:22px;font-weight:800;letter-spacing:1px}
.header h1 span{color:var(--blue-b)}
.header-right{display:flex;gap:16px;align-items:center}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.header-stat{text-align:right}
.header-stat .label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.header-stat .value{font-size:18px;font-weight:700}
.header-stat .value.up{color:var(--green-b)}
.header-stat .value.down{color:var(--red-b)}

/* GRID */
.container{max-width:1600px;margin:0 auto;padding:24px}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.bot-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;backdrop-filter:blur(20px);transition:border-color 0.3s}
.card:hover{border-color:var(--border-h)}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:8px;font-weight:600}
.card-value{font-size:28px;font-weight:800}
.card-sub{font-size:13px;color:var(--t2);margin-top:4px}

/* SUMMARY CARD */
.sum-card{text-align:center}
.sum-card .icon{font-size:24px;margin-bottom:8px}

/* BOT SECTION */
.bot-card{border-radius:20px;overflow:hidden}
.bot-header{padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
.bot-header h2{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
.bot-header .status{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.bot-header .status.active{background:var(--green-g);color:var(--green-b);border:1px solid rgba(16,185,129,0.3)}

.bot-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 24px 16px}
.bot-stat{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:14px;text-align:center}
.bot-stat .label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:4px}
.bot-stat .val{font-size:20px;font-weight:700}

.chart-area{padding:0 24px 20px}
.chart-wrap{background:rgba(0,0,0,0.2);border-radius:12px;padding:16px;height:200px;position:relative}

/* TRADES TABLE */
.trades-area{padding:0 24px 24px}
.trades-area h3{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--t3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--t2)}
tr:hover td{background:rgba(99,102,241,0.04)}
.pnl-up{color:var(--green-b);font-weight:600}
.pnl-down{color:var(--red-b);font-weight:600}

/* FOOTER */
.footer{text-align:center;padding:20px;color:var(--t3);font-size:12px;border-top:1px solid var(--border);margin-top:20px}

/* POSITION BADGE */
.pos-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600;margin:4px}
.pos-badge.long{background:var(--green-g);color:var(--green-b);border:1px solid rgba(16,185,129,0.2)}
.pos-badge.short{background:var(--red-g);color:var(--red-b);border:1px solid rgba(239,68,68,0.2)}
.pos-badge.flat{background:rgba(255,255,255,0.03);color:var(--t3);border:1px solid rgba(255,255,255,0.08)}

/* PROGRESS BAR */
.progress-wrap{margin:8px 0}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:4px}
.progress-bar{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 0.5s}
.progress-fill.green{background:linear-gradient(90deg,var(--green),var(--green-b))}
.progress-fill.blue{background:linear-gradient(90deg,var(--blue),var(--blue-b))}
.progress-fill.red{background:linear-gradient(90deg,var(--red),var(--red-b))}

@media(max-width:1024px){
  .summary-grid{grid-template-columns:repeat(3,1fr)}
  .bot-grid{grid-template-columns:1fr}
  .bot-stats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .header{flex-direction:column;gap:12px}
}
</style>
</head>
<body>

<div class="header">
  <h1>🤖 <span>ANNIE</span> TRADING LAB</h1>
  <div class="header-right">
    <div class="header-stat">
      <div class="label">Portfolio PnL</div>
      <div class="value up" id="h-pnl">--</div>
    </div>
    <div class="header-stat">
      <div class="label">Active Bots</div>
      <div class="value" id="h-bots">2</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)">
      <span class="live-dot"></span> LIVE
    </div>
  </div>
</div>

<div class="container">
  <!-- SUMMARY -->
  <div class="summary-grid" id="summary"></div>
  
  <!-- BOTS -->
  <div class="bot-grid">
    <div class="card bot-card" id="bot-v16"></div>
    <div class="card bot-card" id="bot-champion"></div>
  </div>
</div>

<div class="footer">
  Annie Trading Lab · Updated <span id="ts">--</span> · Auto-refresh 60s
</div>

<script>
const fmt = (n,d=2) => n!=null ? n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}) : '--';
const fmtPnl = (n) => n>=0 ? `+$${fmt(n)}` : `-$${fmt(Math.abs(n))}`;
const pnlClass = (n) => n>=0 ? 'pnl-up' : 'pnl-down';
const pnlColor = (n) => n>=0 ? 'up' : 'down';

function renderSummary(d) {
  const p = d.portfolio || {};
  const v = d.v16_50k || {};
  const t = d.topstep_champion || {};
  
  document.getElementById('h-pnl').textContent = fmtPnl(p.total_pnl||0);
  document.getElementById('h-pnl').className = `value ${pnlColor(p.total_pnl||0)}`;
  document.getElementById('h-bots').textContent = p.active_bots||0;
  
  const items = [
    {icon:'💰',label:'Total Equity',value:`$${fmt(p.total_equity||0)}`,sub:`Capital: $${fmt(p.total_capital||0)}`},
    {icon:'📈',label:'Total PnL',value:fmtPnl(p.total_pnl||0),sub:`${fmt(p.total_pnl_pct||0)}%`,cls:pnlColor(p.total_pnl||0)},
    {icon:'🔄',label:'Total Trades',value:p.total_trades||0,sub:'All bots combined'},
    {icon:'🎯',label:'V16 WR',value:v.stats?`${v.stats.wr}%`:'--',sub:`PF: ${v.stats?v.stats.pf:'--'}`},
    {icon:'🏆',label:'Champion WR',value:t.stats?`${t.stats.wr}%`:'--',sub:`PF: ${t.stats?t.stats.pf:'--'}`},
  ];
  document.getElementById('summary').innerHTML = items.map(i => `
    <div class="card sum-card">
      <div class="icon">${i.icon}</div>
      <div class="card-title">${i.label}</div>
      <div class="card-value ${i.cls||''}">${i.value}</div>
      <div class="card-sub">${i.sub}</div>
    </div>
  `).join('');
}

function renderBot(el, bot, name, emoji, color) {
  if (!bot) { el.innerHTML = `<div class="bot-header"><h2>${emoji} ${name}</h2><span class="status">OFFLINE</span></div>`; return; }
  const s = bot.stats || {};
  const posHtml = (bot.positions||[]).length > 0
    ? bot.positions.map(p => `<span class="pos-badge ${(p.direction||'').toLowerCase()}">${p.direction} ${p.instrument} @ ${fmt(p.entry)}</span>`).join('')
    : '<span class="pos-badge flat">No Position</span>';
  
  const profitPct = bot.profit_target ? Math.min(100, Math.max(0, bot.pnl / bot.profit_target * 100)) : 0;
  const ddPct = bot.drawdown_pct || 0;
  
  el.innerHTML = `
    <div class="bot-header">
      <h2>${emoji} ${name}</h2>
      <span class="status active">● RUNNING</span>
    </div>
    <div class="bot-stats">
      <div class="bot-stat"><div class="label">Equity</div><div class="val">$${fmt(bot.equity)}</div></div>
      <div class="bot-stat"><div class="label">PnL</div><div class="val ${pnlColor(bot.pnl)}">${fmtPnl(bot.pnl)}</div></div>
      <div class="bot-stat"><div class="label">Trades</div><div class="val">${bot.trades_count}</div></div>
      <div class="bot-stat"><div class="label">Win Rate</div><div class="val">${s.wr||0}%</div></div>
    </div>
    <div style="padding:0 24px 12px">
      ${posHtml}
    </div>
    ${bot.profit_target ? `
    <div style="padding:0 24px 8px">
      <div class="progress-wrap">
        <div class="progress-label"><span>Profit Target</span><span>$${fmt(bot.pnl)} / $${fmt(bot.profit_target)}</span></div>
        <div class="progress-bar"><div class="progress-fill green" style="width:${profitPct}%"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Drawdown</span><span>${fmt(ddPct)}%</span></div>
        <div class="progress-bar"><div class="progress-fill ${ddPct>50?'red':'blue'}" style="width:${Math.min(100,ddPct)}%"></div></div>
      </div>
    </div>` : ''}
    <div class="chart-area"><div class="chart-wrap"><canvas id="chart-${name.replace(/\s/g,'')}" height="160"></canvas></div></div>
    <div class="trades-area">
      <h3>Recent Trades</h3>
      <table>
        <tr><th>Instrument</th><th>Dir</th><th>Entry</th><th>Exit</th><th>PnL</th><th>Reason</th></tr>
        ${(bot.recent_trades||[]).slice(0,8).map(t => `
          <tr>
            <td>${t.instrument||'--'}</td>
            <td>${t.direction||'--'}</td>
            <td class="mono">${fmt(t.entry)}</td>
            <td class="mono">${fmt(t.exit)}</td>
            <td class="${pnlClass(t.pnl)} mono">${fmtPnl(t.pnl)}</td>
            <td>${t.reason||'--'}</td>
          </tr>
        `).join('')}
      </table>
    </div>
  `;
  
  // Equity curve
  setTimeout(() => {
    const canvas = document.getElementById(`chart-${name.replace(/\s/g,'')}`);
    if (!canvas || !(bot.equity_curve||[]).length) return;
    const ctx = canvas.getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: bot.equity_curve.map(p => p.x),
        datasets: [{
          data: bot.equity_curve.map(p => p.y),
          borderColor: color,
          backgroundColor: color + '15',
          fill: true,
          tension: 0.3,
          pointRadius: 2,
          pointHoverRadius: 5,
          borderWidth: 2,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {legend:{display:false}, tooltip:{callbacks:{label:ctx=>`$${fmt(ctx.raw)}`}}},
        scales: {
          x: {display:false},
          y: {grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#475569',callback:v=>`$${(v/1000).toFixed(0)}k`}}
        }
      }
    });
  }, 100);
}

async function load() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    const d = await r.json();
    document.getElementById('ts').textContent = d.timestamp || '--';
    renderSummary(d);
    renderBot(document.getElementById('bot-v16'), d.v16_50k, 'V16 50K', '🎯', '#6366f1');
    renderBot(document.getElementById('bot-champion'), d.topstep_champion, 'Topstep Champion', '🏆', '#06b6d4');
  } catch(e) { console.error('Load failed:', e); }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
